<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8">
    <title>Curtains</title>
    <style type="text/css">
    * {
        margin: 0;
        padding: 0;
    }

    body {
        text-align: center;
        background: #4f3722 url('images/darkcurtain.jpg') repeat-x;
    }

    img {
        border: none;
    }

    .leftcurtain {
        width: 50%;
        height: 495px;
        top: 0px;
        left: 0px;
        position: absolute;
        z-index: 2;
    }

    .rightcurtain {
        width: 51%;
        height: 495px;
        right: 0px;
        top: 0px;
        position: absolute;
        z-index: 3;
    }

    .rightcurtain img,
    .leftcurtain img {
        width: 100%;
        height: 100%;
    }

    .logo {
        margin: 0px auto;
        margin-top: 150px;
    }

    .rope {
        position: absolute;
        top: -40px;
        left: 70%;
        z-index: 4;
    }
    </style>
</head>

<body>
    <div class="leftcurtain"><img src="images/frontcurtain.jpg" /></div>
    <div class="rightcurtain"><img src="images/frontcurtain.jpg" /></div>
    <img class="logo" src="images/buildinter.png" />
    <a class="rope" href="#">
        <img src="images/rope.png" />
    </a>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/jquery.easing.1.3.js" type="text/javascript"></script>
    <script type="text/javascript">
    $(document).ready(function() {
        let curtainOpen = false;
        let rope = $(".rope");
        rope.on("click", function() {
            if (curtainOpen == false) {
                animeer("0px", "60px", "60px", true);
            } else {
                animeer("-40px", "50%", "51%", false);
            }
        });

        function animeer(topWaarde, widthLinks, widthRechts, open) {
            rope.stop().animate({ top: topWaarde }, {duration: 1000}, {easing: "easeOutBounce"});

            $(".leftcurtain").stop().animate({width: widthLinks}, 2000);
            $(".rightcurtain").stop().animate({width: widthRechts}, 2000);

            curtainOpen = open;
        }

    });
    </script>
</body>

</html>
