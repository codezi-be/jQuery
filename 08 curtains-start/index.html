<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8">
    <title>Curtains</title>
    <style type="text/css">
    * {
        margin: 0;
        padding: 0;
    }

    body {
        text-align: center;
        background: #4f3722 url('images/darkcurtain.jpg') repeat-x;
    }

    img {
        border: none;
    }

    .leftcurtain {
        width: 50%;
        height: 495px;
        top: 0px;
        left: 0px;
        position: absolute;
        z-index: 2;
    }

    .rightcurtain {
        width: 51%;
        height: 495px;
        right: 0px;
        top: 0px;
        position: absolute;
        z-index: 3;
    }

    .rightcurtain img,
    .leftcurtain img {
        width: 100%;
        height: 100%;
    }

    .logo {
        margin: 0px auto;
        margin-top: 150px;
    }

    .rope {
        position: absolute;
        top: -40px;
        left: 70%;
        z-index: 4;
    }
    </style>
</head>

<body>
    <div class="leftcurtain"><img src="images/frontcurtain.jpg" /></div>
    <div class="rightcurtain"><img src="images/frontcurtain.jpg" /></div>
    <img class="logo" src="images/buildinter.png" />
    <a class="rope" href="#">
        <img src="images/rope.png" />
    </a>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/jquery.easing.1.3.js" type="text/javascript"></script> <!-- jQuery easing script moet je downloaden als je wilt gebruiken -->
    <script type="text/javascript">
    $(document).ready(function() { // wachten tot het document is geladen
        let curtainOpen = false; // we maken een booleaan variabele en zetten deze op false
        let rope = $(".rope"); // we vragen met jQuery het element met de class rope op en plaatsen deze in de variabele rope
        rope.on("click", function() { // we plaatsen een event listener (click) op het element met de class rope
            if (curtainOpen == false) { // als de variabele curtainOpen false is
                animeer("0px", "60px", "60px", true); // we gaan de functie animeer gebruiken en geven de parameters 0px, 60px, 60px en true mee
            } else { // anders
                animeer("-40px", "50%", "51%", false); // we gaan de functie animeer gebruiken en geven de parameters -40px, 50%, 51% en false mee
            }
        });

        function animeer(topWaarde, widthLinks, widthRechts, open) { // we maken een functie met de naam animeer en geven de parameters topWaarde, widthLinks, widthRechts en open
            rope.stop().animate({ top: topWaarde }, {duration: 1000}, {easing: "easeOutBounce"}); // we gaan de stop() gebruiken om de animatie in de queue te voorkomen en geven de parameters topWaarde, 1000 en easeOutBounce mee aan de animate()

            $(".leftcurtain").stop().animate({width: widthLinks}, 2000); // we gaan de stop() gebruiken om de animatie in de queue te voorkomen en geven de parameters widthLinks en 2000 mee aan de animate()
            $(".rightcurtain").stop().animate({width: widthRechts}, 2000); // we gaan de stop() gebruiken om de animatie in de queue te voorkomen en geven de parameters widthRechts en 2000 mee aan de animate()

            curtainOpen = open; // we zetten de variabele curtainOpen op open
        }

    });
    </script>
</body>

</html>
