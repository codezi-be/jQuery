<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mydiv {
            Margin: 10px;
            padding: 12px;
            border: 2px solid #666;
            width: 100px;
            height: 100px;
        }
    </style>
</head>

<body>

    <div class="mydiv">
        Dit is mijn div.
    </div>

    <input id="button" type="button" value="Hide/Show" />


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#button").on("click", function () { // we plaatsen een event listener (click) op de button
                $(".mydiv").toggle(1000); // we plaatsen toggle op de div met class mydiv
            });
        });
    </script>

</body>

</html>
