<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #content {
            background-color: #ffaa00;
            width: 300px;
            height: 30px;
            padding: 3px;
        }
    </style>
</head>

<body>

    <input type="button" id="animate" value="Animate" />
    <div id="content">Animate me</div>



    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () { // wachten tot het document is geladen
            $("#animate").on('click', function () { // we plaatsen een event listener (click) op het element met id animate
                $("#content") // we gaan het element met id content oproepen in jQuery
                    .animate({ "height": "100px" }, 500) // we gaan animate()gebruiken om de hoogte te veranderen naar 100px
                    .animate({ "width": "250px" }, 500); // we gaan animate()gebruiken om de breedte te veranderen naar 250px

            });

        });
    </script>

</body>

</html>
