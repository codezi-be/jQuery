<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css ">
    <title>Document</title>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: #000;
        }

        div {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <h1 class="animate__animated animate__bounceIn">Animatie met animate.css</h1>
    <div>
        <a id="link" href="#">Flash de box</a>
        <div id="box" class="animate__animated"></div>
    </div>
    <div>Naam:
        <input id="naam" type="text" class="animate__animated"> </input>
        <button id="knop">Verzend</button>
    </div>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            let $box = $("#box");
            let $naam = $("#naam");

            $("#link").on("click", function (){
                animeer($box, "animate__flash");
            });
                
            $("#knop").on("click", function (){
                if ($naam.val() == "") {
                    animeer($naam, "animate__shakeX");
                }
            })

            function animeer(element, antimatie){
                element.addClass(antimatie);
                setTimeout(function () {
                    element.removeClass(antimatie);
                }, 1000);
            }
        });
    </script>

</body>

</html>
