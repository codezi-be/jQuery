<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css "> <!-- linkt naar animate.css zonder deze werkt de animatie niet -->
    <title>Document</title>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: #000;
        }

        div {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <h1 class="animate__animated animate__bounceIn">Animatie met animate.css</h1>
    <div>
        <a id="link" href="#">Flash de box</a>
        <div id="box" class="animate__animated"></div>
    </div>
    <div>Naam:
        <input id="naam" type="text" class="animate__animated"> </input>
        <button id="knop">Verzend</button>
    </div>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () { // wachten tot het document is geladen
            let $box = $("#box"); // we plaasten het element met id box in een variabele $box
            let $naam = $("#naam"); // we plaasten het element met id naam in een variabele $naam

            $("#link").on("click", function (){ // we plaatsen een event listener (click) op heet element met id link
                animeer($box, "animate__flash"); // we gaan de variabele $box meegeven aan de functie animeer en geven de parameter animate__flash mee
            });
                
            $("#knop").on("click", function (){ // we plaatsen een event listener (click) op het element met id knop
                if ($naam.val() == "") { // als de waarde van het element met id naam leeg is
                    animeer($naam, "animate__shakeX"); // geven we de variabele $naam mee aan de functie animeer en geven de parameter animate__shakeX mee
                }
            })

            function animeer(element, antimatie){ // we maken een functie met de naam animeer en geven de parameters element en antimatie
                element.addClass(antimatie); // we gaan de variabele element de class antimatie geven
                setTimeout(function () { // we gaan een timeout van 1 seconde geven en starten een functie
                    element.removeClass(antimatie); // we gaan de variabele element de class antimatie verwijderen
                }, 1000); // de snelheid van de animatie is 1 seconde
            }
        });
    </script>

</body>

</html>
