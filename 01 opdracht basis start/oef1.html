<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <style type="text/css">
    </style>
</head>

<body>
    <table>
        <tr>
            <td>Lorem ipsum dolor sit amet</td>
        </tr>
        <tr>
            <td>consectetur adipisicing elit</td>
        </tr>
        <tr>
            <td>sed do eiusmod tempor incididunt</td>
        </tr>
        <tr>
            <td>ut labore et dolore magna aliqua</td>
        </tr>
        <tr>
            <td> Ut enim ad minim veniam</td>
        </tr>
        <tr>
            <td>quis nostrud exercitation ullamco laboris</td>
        </tr>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("tr").eq(0).css("font-weight", "bold"); // we gaan met de eq(0) de eerste rij selecteren en met .css de font-weight bold geven
            $("tr:even").css("background-color", "lightblue"); // we gaan met de :even de even rijen selecteren en met .css de achtergrondkleur lightblue geven
            $("tr:odd").css("background-color", "violet"); // we gaan met de :odd de oneven rijen selecteren en met .css de achtergrondkleur violet geven
        });
    </script>
</body>

</html>
