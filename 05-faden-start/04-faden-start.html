<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <style>
    </style>
</head>

<body>
    <div id="foto">
        <img src="logo-jquery.jpg" />
    </div>
    <input id="knop" type="button" value="fadeOut" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    $(document).ready(function() {
        let $knop = $("#knop"); // we steken de knop in een var
        $knop.on("click", function() {  // we plaatsen een event listener (click) op de var $knop
            $("#foto").fadeToggle(1000, function() { // we plaatsen fadeToggle op de div met id foto
                if ($knop.val() == "fadeOut") {  // als de waarde van de var $knop "fadeOut" is
                $knop.val("fadeIn"); // veranderen we de waarde van de var $knop in "fadeIn"
            } else { 
                $knop.val("fadeOut"); // anders veranderen we de waarde van de var $knop in "fadeOut"
            }
            }); 
        });

    });
    </script>
</body>

</html>
